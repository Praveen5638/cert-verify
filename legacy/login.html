<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CertVerify Pro</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .logo-icon {
            font-size: 3rem;
            color: #2563EB;
            margin-bottom: 1rem;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        p {
            color: #64748b;
            margin-bottom: 2rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            position: relative;
        }

        .google-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .google-icon {
            width: 24px;
            height: 24px;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #2563EB;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            /* Safari */
            animation: spin 1s linear infinite;
            display: none;
            position: absolute;
            right: 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="login-card">
        <i class="fas fa-certificate logo-icon"></i>
        <h1>CertVerify Pro</h1>
        <p>Sign in to manage certificates</p>

        <button class="google-btn" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon"
                alt="Google">
            <span>Sign in with Google</span>
            <div class="loader" id="loader"></div>
        </button>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { auth, googleProvider, signInWithPopup, onAuthStateChanged } from './firebase-config.js';

        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const loader = document.getElementById('loader');

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'admin-dashboard.html';
            }
        });

        loginBtn.addEventListener('click', async () => {
            try {
                loader.style.display = 'block';
                errorMsg.style.display = 'none';
                loginBtn.disabled = true;

                const result = await signInWithPopup(auth, googleProvider);
                // The onAuthStateChanged will handle the redirect
            } catch (error) {
                console.error("Login Failed", error);
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                loader.style.display = 'none';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
